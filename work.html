    <header class="site-header page-header" data-header>
      <a class="brand" href="index.html" aria-label="ReeveByte home">

      <nav class="site-nav" aria-label="主导航">

    <main class="page-shell">
      <section class="page-hero" aria-labelledby="work-title">
        <p class="eyebrow">Selected chaos</p>

        <p>这里是 ReeveByte 的陈列柜：有些项目已经能上桌，有些还在厨房里冒着灵感味。</p>
      </section>

      <section class="section work-section">
        <div class="work-grid">
          <article class="work-card">
            <div class="card-topline">
              <span class="dot teal"></span>
              <span>01</span>
            </div>
            <h3>知识库自助餐</h3>
            <p>把零散笔记摆成一排，假装它们从一开始就很有逻辑。</p>
            <a href="https://github.com/reevebyte" target="_blank" rel="noreferrer">去 GitHub 翻菜单</a>
          </article>

          <article class="work-card">
            <div class="card-topline">
              <span class="dot coral"></span>
              <span>02</span>
            </div>
            <h3>静态网页变装秀</h3>
            <p>没有构建工具，没有花哨后台，只有 HTML、CSS 和一颗想出片的心。</p>
            <a href="index.html">回主页验货</a>
          </article>

          <article class="work-card">
            <div class="card-topline">
              <span class="dot amber"></span>
              <span>03</span>
            </div>
            <h3>自动化小卖部</h3>
            <p>专治重复劳动：把“我再点一次”改成“它自己去点”。</p>
            <a href="contact.html">下单一个想法</a>
          </article>
        </div>
      </section>

    <footer class="site-footer">
